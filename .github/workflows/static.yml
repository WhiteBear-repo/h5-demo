# .github/workflows/static.yml
name: Deploy static site to Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 这里会输出你的页面地址
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔧 关键：设置 Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 📦 你的构建步骤（保持和你之前一样）
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install and Build
        run: |
          pnpm install
          pnpm run build

      # ⬆️ 上传构建好的 dist 文件夹
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 重要：指向 Vite 打包后的目录

      # 🚀 正式发布
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # 监听的触发分支

# 授予写入权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 pnpm (根据你项目实际使用的包管理器调整)
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # 3. 安装 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. 安装依赖并打包
      - name: Install and Build
        run: |
          pnpm install
          pnpm run build

      # 5. 上传产物到 gh-pages 分支
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages # 专门存放构建产物的分支
